name: CI (lint, DAG, Docker)

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install tooling and Airflow (for DagBag)
        run: |
          python -m pip install --upgrade pip
          pip install 'apache-airflow==2.8.1' \
            --constraint https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.10.txt
          pip install flake8 pytest

      - name: Lint (flake8 — syntax / serious errors)
        run: |
          flake8 src/ tests/ dags/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test DAG import (DagBag)
        working-directory: ${{ github.workspace }}
        run: pytest tests/test_dags.py -v

      - name: Build Docker image (Lab 5 ML image)
        run: docker build -t mlops-lab:ci .

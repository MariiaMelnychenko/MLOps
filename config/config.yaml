defaults:
  - model: random_forest
  - hpo: tpe
  - _self_

seed: 42

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null

mlflow:
  tracking_uri: ""
  experiment_name: "HPO_Lab3_Telco"
  log_model: true
  register_model: false
  model_name: "TelcoChurn_OptimizedRF"
  stage: "Staging"

data:
  prepared_dir: data/prepared
  target_column: Churn

hpo:
  n_trials: 20
  metric: f1
  direction: maximize
  use_cv: false
  cv_folds: 5
  val_size: 0.2

  random_forest:
    n_estimators: { low: 50, high: 300 }
    max_depth: { low: 3, high: 25 }
    min_samples_split: { low: 2, high: 20 }
    min_samples_leaf: { low: 1, high: 10 }

  logistic_regression:
    C: { low: 1.0e-3, high: 1.0e2 }
    solver: ["liblinear", "lbfgs"]
    penalty: ["l2"]

  grid:
    random_forest:
      n_estimators: [50, 100, 200]
      max_depth: [5, 10, 15]
      min_samples_split: [2, 5, 10]
      min_samples_leaf: [1, 2, 4]
    logistic_regression:
      C: [0.01, 0.1, 1.0, 10.0]
      solver: ["liblinear"]
      penalty: ["l2"]

name: Model CI (Train, Test, Report)

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 black

      - name: Lint (flake8)
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check (black)
        run: |
          black src/ tests/ --check --diff || true

      # Pre-train tests: data validation
      - name: Pre-train tests (data validation)
        run: |
          pytest tests/test_data.py -v

      # Prepare data (if not already present)
      - name: Prepare data
        run: |
          python src/prepare.py data/raw/telco.csv data/prepared

      # Train model
      - name: Train model
        run: |
          python src/train.py data/prepared data/models

      # Post-train tests: artifacts + Quality Gate
      - name: Post-train tests (Quality Gate)
        env:
          F1_THRESHOLD: "0.50"
        run: |
          pytest tests/test_model.py -v

      # CML report in PR
      - name: Create CML report (PR only)
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install cml
          echo "## Model Metrics" > report.md
          echo '```json' >> report.md
          cat data/models/metrics.json >> report.md
          echo '' >> report.md
          echo '```' >> report.md
          echo "" >> report.md
          echo "## Confusion Matrix" >> report.md
          cml publish data/models/confusion_matrix.png --md >> report.md
          echo "" >> report.md
          echo "## Feature Importance" >> report.md
          cml publish data/models/feature_importance.png --md >> report.md
          echo "" >> report.md
          echo "### Quality Gate" >> report.md
          echo "F1 threshold: \$F1_THRESHOLD" >> report.md
          cml comment create report.md

      # CD: upload model artifact on push to main
      - name: Upload model artifact (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: |
            data/models/model.pkl
            data/models/metrics.json
